<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>FitTrack | Performance Sign In</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-primary-container": "#450040",
                    "surface-tint": "#ff7eea",
                    "on-primary": "#590053",
                    "surface-container-high": "#201f1f",
                    "surface-container-highest": "#262626",
                    "tertiary-container": "#00eefc",
                    "on-secondary-container": "#fff5ff",
                    "tertiary-dim": "#00deec",
                    "surface-container": "#1a1919",
                    "secondary-fixed-dim": "#ddb3ff",
                    "primary-container": "#ff5eeb",
                    "primary-fixed": "#ff5eeb",
                    "secondary-dim": "#a533ff",
                    "primary": "#ff7eea",
                    "on-surface": "#ffffff",
                    "background": "#0e0e0e",
                    "primary-dim": "#ff57eb",
                    "tertiary-fixed-dim": "#00deec",
                    "error-dim": "#d73357",
                    "on-background": "#ffffff",
                    "on-error-container": "#ffb2b9",
                    "on-tertiary-fixed-variant": "#005e64",
                    "error-container": "#a70138",
                    "outline": "#767575",
                    "surface-dim": "#0e0e0e",
                    "primary-fixed-dim": "#f93ee6",
                    "on-secondary-fixed-variant": "#7900c6",
                    "secondary-fixed": "#e7c5ff",
                    "tertiary-fixed": "#00eefc",
                    "on-primary-fixed-variant": "#55004f",
                    "surface-bright": "#2c2c2c",
                    "outline-variant": "#484847",
                    "on-tertiary": "#005d63",
                    "tertiary": "#8ff5ff",
                    "on-error": "#490013",
                    "secondary-container": "#8c00e5",
                    "surface-container-low": "#131313",
                    "on-secondary": "#340059",
                    "surface-container-lowest": "#000000",
                    "inverse-on-surface": "#565555",
                    "inverse-surface": "#fcf9f8",
                    "on-secondary-fixed": "#500086",
                    "error": "#ff6e84",
                    "on-surface-variant": "#adaaaa",
                    "inverse-primary": "#ad00a1",
                    "on-tertiary-fixed": "#003f43",
                    "on-primary-fixed": "#000000",
                    "surface-variant": "#262626",
                    "surface": "#0e0e0e",
                    "secondary": "#c47fff",
                    "on-tertiary-container": "#005359"
            },
            "borderRadius": {
                    "DEFAULT": "1rem",
                    "lg": "2rem",
                    "xl": "3rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Plus Jakarta Sans"],
                    "body": ["Plus Jakarta Sans"],
                    "label": ["Plus Jakarta Sans"]
            }
          },
        },
      }
    </script>
<style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #0e0e0e;
            overflow: hidden;
        }
        .kinetic-bg {
            background: 
                radial-gradient(circle at 20% 30%, rgba(255, 126, 234, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(196, 127, 255, 0.05) 0%, transparent 50%);
        }
        .glass-card {
            background: rgba(26, 25, 25, 0.6);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
        }
        .neon-glow:hover {
            box-shadow: 0 0 20px rgba(255, 126, 234, 0.3);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        @media (max-width: 768px) {
            body { overflow: auto; }
            .glass-card { padding: 1.25rem !important; }
            h1 { font-size: 1.75rem !important; }
            .fixed.bottom-12.right-12 { position: static !important; margin-top: 1rem; }
        }
    </style>
<script type="module" src="/js/firebase-init.js"></script>
</head>
<body class="bg-background text-on-surface min-h-screen flex items-center justify-center p-6 kinetic-bg selection:bg-primary selection:text-on-primary">
<!-- Cinematic Background Image Overlay -->
<div class="fixed inset-0 z-0 opacity-40">
<img alt="" class="w-full h-full object-cover grayscale brightness-[0.3]" data-alt="atmospheric dark gym interior with dramatic shadows and purple neon light strips reflecting on polished concrete floor" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDz47rBxBodZmVG3lgCMYjIdefOskW5A4esCWq2Ot0a30E3PNt_LDC7WmfTOIziO5j-FhXmSYsaGcI1q8CGn7R4nn2XKo7FpXJKSu6yBraTNQKrCHpRTjDy4tEb9MZQrQ-2QsO1TnKB_riZvku2wxpzrCowUGz4ArpLMXKh67q042XzP7WQrzmGZQQ35laGvEis1eiA9UZrFSnfFMmadwVKMU3UZcpC92vbdvzeM9TKb5vUgk-4OZvxDqEdEAf0QVgZaOCdeOdo1Ck"/>
<div class="absolute inset-0 bg-gradient-to-t from-background via-transparent to-background"></div>
</div>
<!-- Main Content Container -->
<main class="relative z-10 w-full max-w-[1440px] h-full flex items-center justify-center">
<!-- Login Card -->
<div class="glass-card w-full max-w-[480px] p-12 rounded-xl shadow-[0_8px_48px_-12px_rgba(196,127,255,0.08)] border border-outline-variant/15 flex flex-col gap-8 transition-all duration-500 hover:scale-[1.01]">
<!-- Brand Identity -->
<div class="flex flex-col gap-2 items-center text-center">
<span class="text-3xl font-black tracking-tighter text-transparent bg-clip-text bg-gradient-to-br from-[#ff7eea] to-[#c47fff]">FitTrack</span>
<p class="text-on-surface-variant font-body text-sm tracking-wide uppercase font-medium">Obsidian Performance Engine</p>
</div>
<!-- Header Text -->
<div class="flex flex-col gap-1 text-center">
<h1 class="text-3xl font-bold tracking-tight text-on-surface">Welcome back</h1>
<p class="text-on-surface-variant text-sm">Enter your credentials to access your dashboard</p>
<p id="login-info" class="text-tertiary text-sm mt-2"></p>
</div>
<!-- Login Form -->
<form class="flex flex-col gap-6" id="login-form">
      <!-- Email Field -->
      <div class="flex flex-col gap-2">
          <label class="text-[0.75rem] font-bold uppercase tracking-[0.05em] text-[#adaaaa] ml-4">Email Address</label>
          <div class="relative group">
              <span class="material-symbols-outlined absolute left-5 top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within:text-tertiary transition-colors">alternate_email</span>
              <input class="w-full h-14 pl-14 pr-6 bg-surface-container-highest border-none rounded-full text-on-surface placeholder:text-outline focus:ring-1 focus:ring-tertiary/40 focus:bg-surface-container-highest/80 transition-all outline-none" placeholder="name@company.com" type="email" id="email" required/>
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-2">
<div class="flex justify-between items-end px-4">
<label class="text-[0.75rem] font-bold uppercase tracking-[0.05em] text-[#adaaaa]">Password</label>
<a class="text-[0.7rem] font-bold text-secondary hover:text-primary transition-colors" href="#" onclick="alert('Please check your email for the password reset link, or contact support.'); return false;">Forgot Password?</a>
</div>
<div class="relative group">
<span class="material-symbols-outlined absolute left-5 top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within:text-tertiary transition-colors">lock</span>
<input class="w-full h-14 pl-14 pr-6 bg-surface-container-highest border-none rounded-full text-on-surface placeholder:text-outline focus:ring-1 focus:ring-tertiary/40 focus:bg-surface-container-highest/80 transition-all outline-none" placeholder="••••••••" type="password" id="password" required/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-white" id="toggle-password" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<!-- Action Button -->
<button class="w-full h-14 bg-gradient-to-br from-primary to-secondary rounded-full text-on-primary-fixed font-bold tracking-tight neon-glow transition-all active:scale-95 flex items-center justify-center gap-2 group" type="submit" id="login-btn">
        <span>Sign In</span>
        <span class="material-symbols-outlined group-hover:translate-x-1 transition-transform">arrow_forward</span>
    </button>
    <p id="login-error" class="text-error text-sm text-center -mt-4"></p>
</form>
<!-- Divider -->
<div class="flex items-center gap-4 py-2">
<div class="h-[1px] flex-1 bg-outline-variant/15"></div>
<span class="text-[0.75rem] font-bold text-outline-variant uppercase tracking-widest">Or continue with</span>
<div class="h-[1px] flex-1 bg-outline-variant/15"></div>
</div>
<!-- Social Logins -->
<div class="grid gap-4 grid-cols-1">
<button class="h-12 flex items-center justify-center gap-3 bg-surface-container rounded-full border border-outline-variant/10 hover:bg-surface-container-high hover:border-outline-variant/30 transition-all active:scale-95 px-8">
<svg class="w-5 h-5" fill="currentColor" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
<span class="text-xs font-bold uppercase tracking-wider text-on-surface-variant">Google</span>
</button>
</div>
<!-- Footer Link -->
<div class="text-center pt-2">
<p class="text-sm text-on-surface-variant">Don't have an account? <a class="text-primary font-bold hover:underline decoration-primary/30 underline-offset-4" href="/signup">Join Now</a></p>
</div>
</div>
</main>
<!-- Kinetic Pulse Ornament -->
<div class="fixed bottom-12 right-12 flex items-center gap-3 px-5 py-3 bg-secondary-container/20 rounded-full border border-secondary/10">
<span class="relative flex h-2 w-2">
<span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-secondary opacity-75"></span>
<span class="relative inline-flex rounded-full h-2 w-2 bg-secondary"></span>
</span>
<span class="text-[0.65rem] font-black uppercase tracking-[0.1em] text-secondary">System Active</span>
</div>
<script src="/js/auth.js"></script>
</body></html>
