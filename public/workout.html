<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>FitTrack | Workouts</title>
    <link rel="stylesheet" href="/styles/variables.css"/>
    <link rel="stylesheet" href="/styles/base.css"/>
    <link rel="stylesheet" href="/styles/layout.css"/>
    <link rel="stylesheet" href="/styles/components.css"/>
    <link rel="stylesheet" href="/styles/workout.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
</head>
<body class="bg-surface text-on-surface">

<aside class="sidebar">
    <div class="sidebar-brand">
        <h1>FitTrack</h1>
    </div>
    <nav class="sidebar-nav">
        <a class="nav-link" href="/dashboard">
            <span class="material-symbols-outlined nav-icon">dashboard</span>
            <span>Dashboard</span>
        </a>
        <a class="nav-link active" href="/workout">
            <span class="material-symbols-outlined nav-icon">fitness_center</span>
            <span>Workouts</span>
        </a>
        <a class="nav-link" href="/progress">
            <span class="material-symbols-outlined nav-icon">insights</span>
            <span>Progress</span>
        </a>
        <a class="nav-link" href="/goals">
            <span class="material-symbols-outlined nav-icon">emoji_events</span>
            <span>Goals</span>
        </a>
        <a class="nav-link" href="/profile">
            <span class="material-symbols-outlined nav-icon">person</span>
            <span>Profile</span>
        </a>
    </nav>
    <div class="sidebar-footer">
        <button class="btn btn-primary sidebar-btn" id="sidebar-start-workout-btn">Start Workout</button>
        <a class="logout-link" href="#" id="logout-btn" onclick="event.preventDefault();AuthService.logout()">
            <span class="material-symbols-outlined">logout</span>
            <span>Sign Out</span>
        </a>
    </div>
</aside>

<main class="page-container">
    <header class="workout-header">
        <div class="workout-title-wrap">
            <h2 class="workout-title">Your <span class="text-gradient">Momentum</span></h2>
            <p class="workout-subtitle">Track every drop of sweat. Your journey is a series of consistent kinetic choices.</p>
        </div>
        <button class="btn btn-primary" id="new-workout-btn" style="display: flex; align-items: center; gap: 0.75rem; padding: 1rem 2rem; border-radius: var(--border-radius-full); box-shadow: var(--shadow-lg);">
            <span class="material-symbols-outlined">add_circle</span>
            <span style="font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; font-size: 0.875rem;">Log New Workout</span>
        </button>
    </header>

    <div class="workout-grid" id="workout-grid">
        <!-- Default placeholder until JS loads -->
        <div class="workout-empty-state">
            <span class="material-symbols-outlined workout-empty-icon">fitness_center</span>
            <p class="workout-empty-text">Loading your workouts...</p>
        </div>
    </div>
</main>

<!-- Workout Modal -->
<div class="modal-overlay hidden" id="workout-modal">
    <div class="modal-card">
        <div class="modal-header">
            <h3 class="modal-title">Log Activity</h3>
            <button id="close-workout-modal" class="modal-close-btn">
                <span class="material-symbols-outlined">close</span>
            </button>
        </div>
        <form id="workout-form" style="display: flex; flex-direction: column; gap: 1.5rem;">
            <div class="workout-form-group">
                <label class="workout-form-label" for="workout-name">Workout Name</label>
                <input class="workout-form-input" id="workout-name" placeholder="e.g. Morning Sprint" required type="text"/>
            </div>
            <div class="workout-form-group">
                <label class="workout-form-label" for="workout-type">Type</label>
                <select class="workout-form-select" id="workout-type">
                    <option value="Strength">Strength</option>
                    <option value="Cardio">Cardio</option>
                    <option value="Yoga">Yoga</option>
                    <option value="Swimming">Swimming</option>
                    <option value="Cycling">Cycling</option>
                </select>
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                <div class="workout-form-group">
                    <label class="workout-form-label" for="workout-duration">Duration (min)</label>
                    <input class="workout-form-input" id="workout-duration" min="1" required type="number"/>
                </div>
                <div class="workout-form-group">
                    <label class="workout-form-label" for="workout-calories">Calories</label>
                    <input class="workout-form-input" id="workout-calories" min="0" type="number"/>
                </div>
            </div>
            <div class="workout-form-group">
                <label class="workout-form-label" for="workout-notes">Notes</label>
                <input class="workout-form-input" id="workout-notes" placeholder="Optional notes" type="text"/>
            </div>
            <p id="workout-form-error" style="color: #ff6e84; font-size: 0.875rem;"></p>
            <button class="btn btn-primary" id="workout-submit-btn" style="width: 100%; height: 3.5rem; margin-top: 1rem;" type="submit">Save Session</button>
        </form>
    </div>
</div>

<script src="/js/auth.js"></script>
<script src="/js/workouts.js"></script>
</body>
</html>
